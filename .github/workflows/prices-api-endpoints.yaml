name: Prices API endpoint validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-endpoints:
    name: Live endpoint validation
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Restore cache
        uses: ./.github/actions/restore-cache
      - run: yarn set version stable
      - run: yarn install --immutable
      - run: yarn workspace @curvefi/prices-api test:endpoints
